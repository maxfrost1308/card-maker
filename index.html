<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Maker</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="app-header">
    <h1>Card Maker</h1>
    <div class="header-actions">
      <label class="toggle-label">
        <input type="checkbox" id="show-backs" checked>
        Show backs
      </label>
      <button id="print-btn" class="btn btn-primary">Print / PDF</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <section class="sidebar-section">
        <h2>Card Type</h2>
        <select id="card-type-select">
          <option value="">— Select a card type —</option>
        </select>
        <p id="card-type-desc" class="help-text"></p>
      </section>

      <section class="sidebar-section">
        <h2>Card Data (CSV)</h2>
        <input type="file" id="csv-upload" accept=".csv,.tsv,.txt">
        <p class="help-text">Upload a CSV matching the selected card type's fields.</p>
        <a href="#" id="download-sample" class="help-link" style="display:none;">Download sample CSV</a>
        <a href="#" id="download-template" class="help-link" style="display:none;">Download blank template CSV</a>
      </section>

      <section class="sidebar-section">
        <h2>Field Reference</h2>
        <div id="field-reference" class="field-ref"></div>
      </section>

      <section class="sidebar-section">
        <h2>Upload Custom Card Type</h2>
        <div class="custom-upload-group">
          <label>
            Schema (JSON)
            <input type="file" id="custom-schema" accept=".json">
          </label>
          <label>
            Front Template (HTML)
            <input type="file" id="custom-front" accept=".html,.htm">
          </label>
          <label>
            Back Template (HTML)
            <input type="file" id="custom-back" accept=".html,.htm">
          </label>
          <label>
            Styles (CSS)
            <input type="file" id="custom-css" accept=".css">
          </label>
          <button id="custom-upload-btn" class="btn">Register Card Type</button>
        </div>
      </section>
    </aside>

    <main class="main-area">
      <div id="card-grid" class="card-grid">
        <div class="empty-state">
          <p>Select a card type and upload a CSV to get started.</p>
          <p>Or pick a built-in card type to see sample cards.</p>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="lib/papaparse.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
