<div class="ttrpg-back" data-card-type="ttrpg" style="background:{{back_color}};">
  <div class="ttrpg-back-title">{{name}}</div>
  {{#icon}}
  <div class="ttrpg-back-icon"><img src="{{{icon}}}"></div>
  {{/icon}}
  <div class="ttrpg-back-banners">
    {{#players}}
    <span class="ttrpg-back-banner">
      <svg viewBox="0 0 24 24" class="ttrpg-back-banner-icon"><path d="M12 12c2.7 0 4.8-2.2 4.8-4.8S14.7 2.4 12 2.4 7.2 4.6 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" fill="#fff"></path></svg>
      {{players}}
    </span>
    {{/players}}
    {{#duration}}
    <span class="ttrpg-back-banner">
      <svg viewBox="0 0 24 24" class="ttrpg-back-banner-icon"><path d="M6 2v6l4 4-4 4v6h12v-6l-4-4 4-4V2H6zm10 5.5L12 12l-4-4.5V4h8v3.5zM12 13.5l4 4.5v2H8v-2l4-4.5z" fill="#fff"></path></svg>
      {{duration}}
    </span>
    {{/duration}}
    {{#gm_style}}
    <span class="ttrpg-back-banner">
      <svg viewBox="0 0 24 24" class="ttrpg-back-banner-icon"><path d="M12 3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-2 8v8h1v-4h2v4h1v-8c1.1 0 2-.4 2.8-1H7.2c.5.6 1.3 1 2.8 1zm8-3l-2.5 2.5 1.4 1.4L22 6.8l-1.4-1.4L18 8z" fill="#fff"></path></svg>
      {{gm_style}}
    </span>
    {{/gm_style}}
    {{#product_type}}
    <span class="ttrpg-back-banner">
      <svg viewBox="0 0 24 24" class="ttrpg-back-banner-icon"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"></path></svg>
      {{product_type}}
    </span>
    {{/product_type}}
    {{#format}}
    <span class="ttrpg-back-banner">
      <svg viewBox="0 0 24 24" class="ttrpg-back-banner-icon"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM14 2v6h6" fill="none" stroke="#fff" stroke-width="2"></path></svg>
      {{format}}
    </span>
    {{/format}}
  </div>
  {{#qr_code}}
  <div class="ttrpg-back-qr"><img src="{{{qr_code}}}"></div>
  {{/qr_code}}
</div>
